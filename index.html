<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">  
</head>
<body>
  <header>
    <div class="title">Welcome to Luthadel, The City of Ash and Iron </div>
    <div class="subtitle">Venture into the mist at your own peril… the night belongs to the Mistborn </div>
  </header>
  <form id="form" action="#" method="post">
    <div class="form-header">
      <h2>Begin Your Adventure With Us!</h2>
    </div>
      
   <div class="name">
    <label for="first-name">First Name</label>
    <input type="text" id="first-name" name="first-name" placeholder="Enter your first name" required>
   </div>
   <div class="name">
    <label for="last-name">Last Name</label>
    <input type="text" id="last-name" name="last-name" placeholder="Enter your last name" required>
   </div>

    <div class="name">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>
    </div>

    <div class="phone-number">
      <label for="phone">Phone Number</label>
      <input type="number" id="phone" name="phone" placeholder="Enter your phone number">
    </div>
    <div class="password">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>
    </div>
    <div class="confirm">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
    </div>
    <div class="check">
      <input type="checkbox" id="offers" name="terms" required>
      <label for="offers">I want to receive offers via email</label>
    </div>
    <button class="button"type="submit">Create Account</button>

    
  </form>

  <div class="form-footer">
      <p>Already have an account? <a href="#">Sign in</a></p>
    </div>

  <div class="background-img">
    <img src="https://uploads.coppermind.net/Vin_mistborn_by_Steve_Argyle.jpg" alt="mistborn">
  </div>
  <div class="logo">
    <img src="https://preview.redd.it/is-there-a-mistborn-logo-or-symbol-v0-3k09gvmfn1id1.png?width=225&format=png&auto=webp&s=452011f952d6ceea8d7a0eec9d84531f865c2a00" alt="">
  </div>

    
  
</body>
</html>
